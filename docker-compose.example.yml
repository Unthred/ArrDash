# Minimal ArrDash compose for any Docker host.
# Unraid extras (parity/mover/docker metrics): see docker-compose.unraid.example.yml
services:
  arrdash:
    image: ghcr.io/unthred/arrdash:latest
    # Build from source instead of pulling (if GHCR pull fails):
    # image: # (comment out the image line above)
    # build: .
    container_name: arrdash
    init: true
    ports:
      - "7979:8080"
    environment:
      TZ: Europe/London
      ARRDASH_CONFIG_PATH: /config
      ARRDASH_HOST_LABEL: Host
      ARRDASH_DISK_PATH: /
      ARRDASH_METRICS_POLL_SECONDS: 2
      # Optional service URLs/keys — leave blank and configure in Settings → API keys
      SONARR_URL: ""
      SONARR_API_KEY: ""
      RADARR_URL: ""
      RADARR_API_KEY: ""
      CHAPTARR_URL: ""
      CHAPTARR_API_KEY: ""
      AUDIOBOOKSHELF_URL: ""
      AUDIOBOOKSHELF_API_KEY: ""
      LIDARR_URL: ""
      LIDARR_API_KEY: ""
      SLSKD_URL: ""
      SLSKD_API_KEY: ""
      PLEX_URL: ""
      PLEX_TOKEN: ""
      EMBY_URL: ""
      EMBY_API_KEY: ""
      JELLYFIN_URL: ""
      JELLYFIN_API_KEY: ""
      TMDB_API_KEY: ""
      POLL_INTERVAL_SECONDS: 30
      RECENT_LIMIT: 20
    volumes:
      - ./config:/config
    restart: unless-stopped
