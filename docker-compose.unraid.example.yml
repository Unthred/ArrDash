# Unraid-oriented ArrDash compose (host metrics + optional Unraid activity).
# For a generic Docker host, use docker-compose.example.yml instead.
services:
  arrdash:
    image: ghcr.io/unthred/arrdash:latest
    container_name: arrdash
    init: true
    ports:
      - "7979:8080"
    environment:
      TZ: Europe/London
      ARRDASH_CONFIG_PATH: /config
      ARRDASH_HOST_LABEL: Unraid
      ARRDASH_DISK_PATH: /mnt/user
      ARRDASH_METRICS_POLL_SECONDS: 2
      # Host network throughput — interface name from /host/proc/1/net/dev (often br0)
      ARRDASH_NET_INTERFACE: br0
      SONARR_URL: ""
      SONARR_API_KEY: ""
      RADARR_URL: ""
      RADARR_API_KEY: ""
      CHAPTARR_URL: ""
      CHAPTARR_API_KEY: ""
      AUDIOBOOKSHELF_URL: ""
      AUDIOBOOKSHELF_API_KEY: ""
      LIDARR_URL: ""
      LIDARR_API_KEY: ""
      SLSKD_URL: ""
      SLSKD_API_KEY: ""
      PLEX_URL: ""
      PLEX_TOKEN: ""
      EMBY_URL: ""
      EMBY_API_KEY: ""
      JELLYFIN_URL: ""
      JELLYFIN_API_KEY: ""
      TMDB_API_KEY: ""
      POLL_INTERVAL_SECONDS: 30
      RECENT_LIMIT: 20
    volumes:
      - ./config:/config
      - /mnt/user:/mnt/user:ro
      # Optional — Unraid parity / mover status (feature no-ops if missing)
      - /var/local/emhttp/var.ini:/var/local/emhttp/var.ini:ro
      # Optional — disk health / SMART temps
      - /var/local/emhttp/disks.ini:/var/local/emhttp/disks.ini:ro
      # Optional — Docker update/restart visibility + top containers.
      # Grants API visibility into the whole daemon; omit if you don't want that.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
