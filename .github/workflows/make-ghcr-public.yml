# One-shot: set ghcr.io/<owner>/arrdash package visibility to public.
# Uses GITHUB_TOKEN (packages:write). Safe to re-run.
name: Make GHCR package public

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  set-public:
    runs-on: ubuntu-latest
    steps:
      - name: Set arrdash container package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          PKG="arrdash"
          OWNER_LC="${OWNER,,}"
          echo "Setting visibility of ghcr.io/${OWNER_LC}/${PKG} to public…"

          # GITHUB_TOKEN is the Actions bot — must use /users/{owner}/… not /user/…
          url="https://api.github.com/users/${OWNER}/packages/container/${PKG}/visibility"
          code=$(curl -sS -o /tmp/vis.json -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$url" \
            -d '{"visibility":"public"}')
          echo "HTTP ${code}"
          cat /tmp/vis.json || true

          if [ "$code" = "204" ] || [ "$code" = "200" ]; then
            echo "Package is public."
            exit 0
          fi

          # Diagnostics: can we see the package at all?
          echo "--- package metadata ---"
          curl -sS -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/${OWNER}/packages/container/${PKG}" || true
          echo
          echo "::error::Failed to set package visibility (HTTP ${code}). Set it manually: https://github.com/users/${OWNER}/packages/container/${PKG}/settings → Change visibility → Public."
          exit 1
